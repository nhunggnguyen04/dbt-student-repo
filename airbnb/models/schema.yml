models:
  - name: dim_listings_cleansed
    columns:
      - name: listing_id
        data_tests:
          - unique         # không được trùng
          - not_null       # không được null

      - name: host_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id    # phải tồn tại trong bảng kia

      - name: room_type
        data_tests:
          - accepted_values:
              arguments:
                values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']

  - name: dim_hosts_cleansed
    columns:
      - name: host_id
        data_tests: [not_null, unique]
      - name: host_name
        data_tests: [not_null]
      - name: is_superhost
        data_tests:
          - accepted_values:
              arguments:
                values: ['t', 'f']

  - name: fct_reviews
    columns:
      - name: reviewer_name
        data_tests: [not_null]
      - name: review_sentiment
        data_tests:
          - accepted_values:
              arguments:
                values: ['positive', 'neutral', 'negative']
